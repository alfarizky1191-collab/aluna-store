<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Content Security Policy -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
<title>ALUNA Premium Apps</title>

<style>
/* ===== APPS PAGE MODERN UI ===== */

/* BODY */

body{

  background:#f3f5f9;

  color:#111827;

  font-family:'Segoe UI',sans-serif;
}

/* HEADER */

header{

  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:18px 32px;

  background:white;

  border-bottom:
  1px solid #e5e7eb;
}

header h1{

  font-size:20px;

  font-weight:800;

  color:#0f172a;
}

/* NAV */

nav{

  display:flex;

  align-items:center;

  gap:12px;
}

nav a{

  text-decoration:none;

  color:#334155;

  font-weight:600;

  padding:
  10px
  16px;

  border-radius:12px;

  transition:.25s ease;
}

nav a:hover{

  background:#e2e8f0;
}

/* HERO */

.hero{

  background:
  linear-gradient(
    90deg,
    #0f766e,
    #2563eb
  );

  color:white;

  padding:
  80px
  24px;
}

.hero-inner{

  max-width:1060px;

  margin:auto;
}

.hero-label{

  font-size:14px;

  font-weight:700;

  margin-bottom:20px;

  opacity:.9;
}

.hero h2{

  font-size:
  clamp(
    2.4rem,
    6vw,
    5rem
  );

  line-height:1.05;

  margin-bottom:20px;

  font-weight:800;

  max-width:850px;
}

.hero p{

  font-size:18px;

  opacity:.92;

  line-height:1.7;
}

/* PRODUCTS */

.products{

  max-width:1100px;

  margin:
  40px auto
  120px;

  padding:
  0 20px;

  display:grid;

  grid-template-columns:
  repeat(
    auto-fit,
    minmax(240px,1fr)
  );

  gap:22px;
}

/* CARD */

.product-card{

  background:white;

  border-radius:22px;

  overflow:hidden;

  border:
  1px solid #e5e7eb;

  transition:.3s ease;

  box-shadow:
  0 4px 20px rgba(0,0,0,.04);
}

.product-card:hover{

  transform:
  translateY(-6px);

  box-shadow:
  0 10px 28px rgba(0,0,0,.08);
}

/* IMAGE */

.product-image{

  background:#f8fafc;

  display:flex;

  align-items:center;

  justify-content:center;

  padding:28px;

  min-height:170px;
}

.product-image img{

  width:110px;

  height:110px;

  object-fit:contain;
}

/* CONTENT */

.product-content{

  padding:18px;
}

.product-content h3{

  font-size:1.5rem;

  margin-bottom:10px;

  color:#0f172a;
}

.price{

  color:#ff6b00;

  font-size:1.3rem;

  font-weight:800;

  margin-bottom:16px;
}

/* SELECT */

.product-content select{

  width:100%;

  padding:12px;

  border-radius:12px;

  border:
  1px solid #dbe2ea;

  margin-bottom:16px;

  font-size:15px;
}

/* QTY */

.qty{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-bottom:16px;
}

.qty button{

  width:42px;
  height:42px;

  border:none;

  border-radius:12px;

  background:#e7f2ef;

  color:#0f766e;

  font-size:20px;

  font-weight:700;

  cursor:pointer;
}

.qty span{

  font-weight:700;

  font-size:18px;
}

/* BUTTON */

.add-btn{

  width:100%;

  padding:14px;

  border:none;

  border-radius:14px;

  background:#0f766e;

  color:white;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

  transition:.25s ease;
}

.add-btn:hover{

  background:#115e59;
}

/* CHECKOUT BAR */

.checkout-bar{

  position:fixed;

  left:50%;

  bottom:18px;

  transform:translateX(-50%);

  width:min(92%,650px);

  background:white;

  border-radius:20px;

  padding:18px 20px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:
  0 10px 30px rgba(0,0,0,.15);

  z-index:999;
}

.checkout-total{

  display:flex;

  flex-direction:column;

  gap:4px;
}

.checkout-total strong{

  font-size:20px;
}

.checkout-total span{

  color:#64748b;
}

.checkout-btn{

  padding:
  14px
  26px;

  border:none;

  border-radius:14px;

  background:#0f766e;

  color:white;

  font-size:16px;

  font-weight:700;

  cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

  header{

    padding:16px 18px;
  }

  .hero{

    padding:
    60px
    18px;
  }

  .hero h2{

    font-size:2.8rem;
  }

  .hero p{

    font-size:15px;
  }

  .products{

    grid-template-columns:1fr;

    padding:
    0 18px;

    margin-top:24px;
  }

  .checkout-bar{

    width:94%;

    padding:16px;
  }

  .checkout-btn{

    padding:
    12px
    18px;

    font-size:14px;
  }

}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>ALUNA STORE</h1>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../food/index.html">Food</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-label">PREMIUM APPS</div>
    <h2>Premium Apps & Digital Services</h2>
    <p>Get access to premium streaming, productivity tools, and digital services at affordable prices. Choose from our curated selection of top-tier apps.</p>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- CHECKOUT BAR -->
<div class="checkout-bar">
  <div class="checkout-total">
    <strong id="total">Total: Rp 0</strong>
    <span id="item-count">0 items</span>
  </div>
  <button class="checkout-btn" onclick="checkout()">Checkout</button>
</div>

<script>
const rupiah=n=>"Rp "+n.toLocaleString("id-ID");

let cart = [];
const qtyState = {};
const productsContainer = document.getElementById("products");

/* DATA FULL */
const data=[
{ name:"Netflix", img:"https://upload.wikimedia.org/wikipedia/commons/7/75/Netflix_icon.svg",
options:[{label:"Sharing 35K",price:35000},{label:"Semi Private 45K",price:45000}]},

{ name:"Spotify", img:"https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg",
options:[{label:"Famplan 29K",price:29000},{label:"Indplan 41K",price:41000}]},

{ name:"ChatGPT", img:"https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",
options:[{label:"Fulgur 15K",price:15000},{label:"Nogar 10K",price:10000}]},

{ name:"Canva", img:"https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg",
options:[{label:"1 Bulan 3K",price:3000},{label:"3 Bulan 10K",price:10000},{label:"1 Tahun 15K",price:15000}]},

{ name:"YouTube", img:"https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg",
options:[{label:"1 Bulan 5K",price:5000},{label:"3 Bulan 10K",price:10000}]},

{ name:"CapCut", img:"https://upload.wikimedia.org/wikipedia/commons/6/64/CapCut_Logo.png",
options:[{label:"Sharing 20K",price:20000}]},

{ name:"Grammarly", img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Grammarly_logo.svg",
options:[{label:"1 Bulan 13K",price:13000},{label:"3 Bulan 24K",price:24000}]},

{ name:"iQIYI", img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/IQIYI_logo.svg",
options:[{label:"Sharing 10K",price:10000},{label:"Private 35K",price:35000},{label:"1 Tahun 25K",price:25000}]},

{ name:"WeTV", img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Tencent_Video_logo.svg",
options:[{label:"Sharing 15K",price:15000},{label:"Private 35K",price:35000}]},

{ name:"Amazon Prime", img:"https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png",
options:[{label:"Sharing 10K",price:10000},{label:"Private 30K",price:30000}]},

{ name:"VSCO", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/VSCO_Logo.png",
options:[{label:"1 Tahun 20K",price:20000}]},

{ name:"Lightroom", img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/Adobe_Photoshop_Lightroom_CC_logo.svg",
options:[{label:"1 Tahun 15K",price:15000}]},

{ name:"PicsArt", img:"https://upload.wikimedia.org/wikipedia/commons/4/49/PicsArt_Logo.svg",
options:[{label:"Sharing 10K",price:10000},{label:"Private 15K",price:15000}]},

{ name:"Wattpad", img:"https://upload.wikimedia.org/wikipedia/commons/8/82/Wattpad_logo.png",
options:[{label:"Sharing 15K",price:15000}]},

{ name:"Telegram", img:"https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
options:[{label:"3 Bulan 175K",price:175000}]},

{ name:"LokLok", img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Popcorn.png",
options:[{label:"Sharing 25K",price:25000}]},

{ name:"Youku", img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Youku_logo.png",
options:[{label:"1 Bulan 15K",price:15000},{label:"3 Bulan 24K",price:24000},{label:"1 Tahun 30K",price:30000}]},

{ name:"Bstation", img:"https://upload.wikimedia.org/wikipedia/commons/1/12/Bilibili_logo.svg",
options:[{label:"1 Bulan 15K",price:15000},{label:"1 Tahun 25K",price:25000}]},

{ name:"GetContact", img:"https://upload.wikimedia.org/wikipedia/commons/0/02/Phone_icon.png",
options:[{label:"1 Bulan 15K",price:15000}]}
];

/* RENDER */
function render(){
  productsContainer.innerHTML = "";
  data.forEach((p,i)=>{
    let html = `
    <div class="product-card">
      <div class="product-image">
        <img src="${p.img}" alt="${p.name}">
      </div>
      <div class="product-content">
        <h3>${p.name}</h3>
        <div class="price">${rupiah(p.options[0].price)}</div>

        <select id="opt-${i}">
          ${p.options.map(o=>`<option value="${o.price}">${o.label}</option>`).join("")}
        </select>

        <div class="qty">
          <button onclick="changeQty(${i},-1)">-</button>
          <span id="qty-${i}">1</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>

        <button class="add-btn" onclick="add(${i})">Tambah ke Keranjang</button>
      </div>
    </div>`;
    productsContainer.innerHTML += html;
  });
}

/* QTY */
function changeQty(i,val){
  qtyState[i] = (qtyState[i] || 1) + val;
  if(qtyState[i] < 1) qtyState[i] = 1;
  document.getElementById(`qty-${i}`).innerText = qtyState[i];
}

/* ADD */
function add(i){
  const select = document.getElementById(`opt-${i}`);
  const qty = qtyState[i] || 1;

  const found = cart.find(x => x.name === data[i].name && x.label === select.options[select.selectedIndex].text);
  if(found) found.qty += qty;
  else cart.push({
    name: data[i].name,
    label: select.options[select.selectedIndex].text,
    price: parseInt(select.value),
    qty
  });

  update();
}

/* CART */
function update(){
  let total = 0;
  let itemCount = 0;
  cart.forEach(i => {
    total += i.price * i.qty;
    itemCount += i.qty;
  });
  document.getElementById("total").innerText = "Total: " + rupiah(total);
  document.getElementById("item-count").innerText = itemCount + " items";
}

/* CHECKOUT */
function checkout(){
  if(cart.length === 0) return alert("Keranjang kosong!");

  // simpan cart
  localStorage.setItem("cart", JSON.stringify(cart));

  // pindah halaman
  location.href = "checkout.html";
}

/* INIT */
render();
</script>

</body>
</html>
