<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aluna Eats - Premium Street Food</title>

    <style>
        :root { --primary: #ff6b00; --secondary: #ff8c3a; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f6f7fb; padding-bottom: 80px; }

        

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 25px 18px; text-align: center;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        /* FORM DATA */
        .form { background: white; margin: 15px; padding: 15px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

        /* GRID MENU */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .image-box { width: 100%; aspect-ratio: 4/3; overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: #ff3b3b; color: white; font-size: 10px; padding: 4px 8px; border-radius: 10px; font-weight: bold; }

        /* CONTROLS */
        .qty { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: #f9f9f9; padding: 5px; border-radius: 8px; }
        .btn-qty { background: var(--primary); border: none; color: white; width: 30px; height: 30px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* FOOTER CART */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -3px 20px rgba(0,0,0,0.1); z-index: 99; cursor: pointer;
        }
        .btn-checkout { background: var(--primary); border: none; color: white; padding: 12px 20px; border-radius: 12px; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 85%; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; }
        .btn-del { background: #ffeded; color: #ff3b3b; border: none; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>🍴 ALUNA EATS</h2>
    <p>🔥 Street Food Premium • Cepat & Murah</p>
    <p>⭐ Rating 4.9 | 🔥 100+ Pesanan | 🚀 Siap Antar </p>
</div>

<div class="form">
    <b>📍 Data Pengiriman</b>
    <input id="nama" placeholder="Nama Lengkap">
    <input id="alamat" placeholder="Alamat Detail (No. Rumah/Patokan)">
    <input id="nohp" placeholder="Nomor Hp Kamu">
    <input id="catatan" placeholder="Catatan Tambahan">
    <select id="jarak" onchange="updateTotal()">
        <option value="0">-- Pilih Jarak Antar --</option>
        <option value="0">🔵 Ambil Sendiri (Gratis)</option>
        <option value="2000">🟢 Dekat (Rp 2.000)</option>
        <option value="5000">🟡 Sedang (Rp 5.000)</option>
        <option value="8000">🔴 Jauh (Rp 8.000)</option>
    </select>
</div>

<div class="grid" id="menu"></div>

<div class="cart-bar" onclick="toggleModal(true)">
    <div>
        <span style="font-size: 20px;">🛒</span>
        <b><span id="cart-count">0</span> Item</b>
        <div style="color:var(--primary); font-weight:bold">Rp <span id="total-price">0</span></div>
    </div>
    <button class="btn-checkout">Lihat Keranjang</button>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">🛒 Detail Pesanan</h3>
        <div id="cart-list"></div>
        <div id="empty-msg" style="text-align:center; display:none; padding:20px;">Keranjang kosong nih.. 🥺</div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.1em">
            <span>Total Akhir:</span>
            <span id="modal-total-display" style="color:var(--primary)">Rp 0</span>
        </div>
        <button class="btn-checkout" style="width:100%; margin-top:20px; padding:15px" onclick="checkout()">🚀 Pesan Sekarang (WhatsApp)</button>
        <button onclick="toggleModal(false)" style="width:100%; background:none; border:none; color:gray; margin-top:15px; cursor:pointer">Kembali Belanja</button>
    </div>
</div>

<script>
const phone = "6289656009717";
const items = [
    {name:"Batagor", price:5000, img:"https://i.imgur.com/JiFateR.jpeg", best:true, tipe:true},
    {name:"Mie Level", price:8000, level:true, img:"https://i.imgur.com/u6FXtL7.jpeg", best:true,},
    {name:"Cilok", price:5000, img:"https://i.imgur.com/xvHP2rG.jpeg"},
    {name:"Es Potong", price:1000, img:"https://i.imgur.com/3ilf7yY.jpeg",},
    {name:"Suki Bakar", price:5000, img:"https://i.imgur.com/LPkTB2B.jpeg"},
    {name:"Sosis Bakar", price:5000, img:"https://i.imgur.com/ZxwgE0.jpeg"},
    {name:"Jasuke", price:5000, img:"https://i.imgur.com/OGNZogQ.jpeg"}
];

let cart = [];

function render() {
    let html = "";
    items.forEach((item, i) => {
        let options = "";
        if (item.level) {
            options += `<select id="level-${i}"><option value="0">Level 0</option><option value="1/2">Level 1/2</option><option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option></select>`;
        }
        if (item.tipe) {
            options += `<select id="tipe-${i}"><option value="Kuah">Kuah</option><option value="Kering">Kering</option></select>`;
        }

        html += `
            <div class="card">
                <div class="image-box">
                    ${item.best ? '<div class="badge">🔥 BEST</div>' : ''}
                    <img src="${item.img}">
                </div>
                <div style="padding:10px">
                    <div style="font-weight:600; font-size:14px; height:35px">${item.name}</div>
                    <div style="color:var(--primary); font-weight:bold; margin-bottom:5px">Rp ${item.price}</div>
                    ${options}
                    <div class="qty">
                        <button class="btn-qty" onclick="changeQty(${i}, -1)">-</button>
                        <b id="qty-disp-${i}">0</b>
                        <button class="btn-qty" onclick="changeQty(${i}, 1)">+</button>
                    </div>
                </div>
            </div>`;
    });
    document.getElementById("menu").innerHTML = html;
}

function changeQty(index, delta) {
    let level = document.getElementById(`level-${index}`)?.value || "";
    let tipe = document.getElementById(`tipe-${index}`)?.value || "";
    let key = `${index}-${level}-${tipe}`;
    let item = items[index];


    if(item.level && !level){
    alert("Pilih level dulu!");
    return;
}

    if(item.tipe && !tipe){
    alert("Pilih tipe dulu!");
    return;
}

    let found = cart.find(c => c.key === key);

    if (found) {
        found.qty += delta;
        if (found.qty <= 0) cart = cart.filter(c => c.key !== key);
    } else if (delta > 0) {
        cart.push({ key, index, qty: 1, level, tipe });
    }
    
    updateUI();
}

function removeItem(key) {
    cart = cart.filter(c => c.key !== key);
    updateUI();
    renderCartList();
}

function updateUI() {
    // Update angka di setiap card
    items.forEach((_, i) => {
        let totalQty = cart.filter(c => c.index === i).reduce((sum, c) => sum + c.qty, 0);
        document.getElementById(`qty-disp-${i}`).innerText = totalQty;
    });

    // Update Bar Bawah
    let totalHarga = cart.reduce((sum, c) => sum + (items[c.index].price * c.qty), 0);
    let totalItem = cart.reduce((sum, c) => sum + c.qty, 0);
    let ongkir = parseInt(document.getElementById("jarak").value) || 0;

    document.getElementById("cart-count").innerText = totalItem;
    document.getElementById("total-price").innerText = (totalHarga + ongkir).toLocaleString('id-ID');
    document.getElementById("modal-total-display").innerText = "Rp " + (totalHarga + ongkir).toLocaleString('id-ID');
}

function toggleModal(show) {
    document.getElementById("cartModal").style.display = show ? "block" : "none";
    if(show) renderCartList();
}

function renderCartList() {
    let listDiv = document.getElementById("cart-list");
    let emptyMsg = document.getElementById("empty-msg");
    listDiv.innerHTML = "";
    
    if (cart.length === 0) {
        emptyMsg.style.display = "block";
        return;
    }
    
    emptyMsg.style.display = "none";
    cart.forEach(c => {
        let item = items[c.index];
        let row = document.createElement("div");
        row.className = "cart-item";
        row.innerHTML = `
            <div>
                <b>${item.name}</b> <small>${c.tipe} ${c.level ? 'Lvl '+c.level : ''}</small><br>
                <span>${c.qty} x Rp ${item.price}</span>
            </div>
            <button class="btn-del" onclick="removeItem('${c.key}')">Hapus</button>
        `;
        listDiv.appendChild(row);
    });
}

function checkout() {
    let nama = document.getElementById("nama").value.trim();
    let alamat = document.getElementById("alamat").value.trim();
    let nohp = document.getElementById("nohp").value.trim(); // ✅ FIX
    let catatan = document.getElementById("catatan").value.trim();
    let ongkir = parseInt(document.getElementById("jarak").value) || 0;

    // ✅ VALIDASI DI ATAS (WAJIB)
    if (!nama || !alamat || !nohp || cart.length === 0) {
        alert("Lengkapi Data Nama, Alamat, No HP, dan Pilih Menu dulu ya!");
        return;
    }

    // ✅ SIMPAN DATA
    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("nama", nama);
    localStorage.setItem("alamat", alamat);
    localStorage.setItem("nohp", nohp);
    localStorage.setItem("catatan", catatan);
    localStorage.setItem("ongkir", ongkir);

    // ✅ PINDAH HALAMAN (INI YANG KAMU MAU)
    window.location.href = "checkout.html";
}
// Inisialisasi awal
render();
updateUI();
</script>
</body>
</html>
